<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: #eef1f6;
      color: #1a2332;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(1.5rem, 5vw, 2.5rem) 1.25rem 2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .brand svg {
      flex-shrink: 0;
    }

    .brand span {
      font-size: clamp(1.5rem, 4vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .brand span em {
      font-style: normal;
      color: #2563eb;
    }

    .tagline {
      margin: 0 0 1.5rem;
      font-size: 0.9rem;
      color: #5c6b80;
      text-align: center;
      max-width: 28rem;
    }

    .embed-wrap {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(26, 35, 50, 0.08), 0 0 0 1px rgba(26, 35, 50, 0.06);
      overflow: hidden;
    }

    .embed-wrap iframe {
      display: block;
      width: 100%;
      height: min(720px, 85vh);
      border: 0;
    }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #8b96a8;
      text-align: center;
      max-width: 32rem;
    }

    .hint code {
      font-size: 0.7rem;
      background: #e2e8f0;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="brand" aria-label="Booking demo">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="44" height="44" rx="12" fill="#2563eb" />
      <path d="M12 16h20v2H12V16zm0 6h20v2H12v-2zm0 6h14v2H12v-2z" fill="white" opacity="0.95" />
      <rect x="12" y="10" width="20" height="4" rx="1" fill="white" opacity="0.35" />
    </svg>
    <span><em>Book</em>ing</span>
  </header>

  <p class="tagline">Simple demo page — your booking form is embedded below.</p>

  <div class="embed-wrap">
    <iframe src="form.html" title="Booking request form"></iframe>
  </div>

  <p class="hint">
    Replace the iframe <code>src</code> with your live form URL (Calendly, TidyCal, your app, etc.) when you go live.
  </p>
</body>
</html>
