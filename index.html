<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book · Medgel Georgia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(61, 156, 240, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 90% 60%, rgba(100, 180, 255, 0.08), transparent);
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      margin: 0;
      padding: clamp(1rem, 3vw, 2rem);
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    .card-embed {
      display: flex;
      flex-direction: column;
      flex: 0 0 auto;
      width: min(1040px, calc(100% - 2rem));
      min-width: 0;
      height: min(88dvh, 860px);
      min-height: min(560px, 80dvh);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-embed[hidden] {
      display: none !important;
    }

    .embed-head {
      padding: 0.85rem 1rem 0.85rem 1.15rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }

    .embed-head span {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
    }

    .embed-body {
      position: relative;
      flex: 1;
      min-height: 0;
      background: var(--bg);
    }

    .embed-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      z-index: 2;
    }

    .embed-loader[hidden] {
      display: none !important;
    }

    .embed-loader p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .booking-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .booking-iframe.is-ready {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main>
    <section class="card-embed" id="panel-embed" aria-label="Online booking">
      <div class="embed-head">
      </div>
      <div class="embed-body">
        <div class="embed-loader" id="embed-loader">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading …</p>
        </div>
        <iframe
          id="booking-frame"
          class="booking-iframe"
          title="Medni booking — Medgel Georgia"
          allow="clipboard-read; clipboard-write; fullscreen"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var MEDNI_BOOKING_URL = "https://www.medni.ge/en/booking/medgel";
      var panelEmbed = document.getElementById("panel-embed");
      var loader = document.getElementById("embed-loader");
      var frame = document.getElementById("booking-frame");
      var loadTimeoutId;

      function clearLoadTimeout() {
        if (loadTimeoutId) {
          clearTimeout(loadTimeoutId);
          loadTimeoutId = null;
        }
      }

      function onFrameLoad() {
        if (panelEmbed.hidden) return;
        var src = frame.getAttribute("src") || "";
        if (!src || src.indexOf("medni.ge") === -1) return;
        clearLoadTimeout();
        loader.hidden = true;
        frame.classList.add("is-ready");
      }

      function beginIframeLoad() {
        clearLoadTimeout();
        loader.hidden = false;
        frame.classList.remove("is-ready");
        frame.src = MEDNI_BOOKING_URL;
        loadTimeoutId = setTimeout(function () {
          loader.hidden = true;
          frame.classList.add("is-ready");
          loadTimeoutId = null;
        }, 20000);
      }

      frame.addEventListener("load", onFrameLoad);

      beginIframeLoad();
    })();
  </script>
</body>
</html>
