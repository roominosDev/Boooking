<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medgel Georgia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
      --accent-dim: #2b7fc9;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(61, 156, 240, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 90% 60%, rgba(100, 180, 255, 0.08), transparent);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: min(1280px, calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(2.5rem, 6vw, 4.5rem) clamp(1.25rem, 4vw, 2rem) clamp(2rem, 4vw, 3rem);
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1.5rem, 4vw, 2.25rem);
      align-items: start;
    }

    @media (min-width: 900px) {
      .wrap.embed-open {
        grid-template-columns: minmax(280px, 400px) minmax(0, 1fr);
        column-gap: clamp(1.75rem, 4vw, 2.5rem);
      }
    }

    .left-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.25rem;
      width: 100%;
      max-width: 26rem;
      justify-self: center;
    }

    @media (min-width: 900px) {
      .wrap.embed-open .left-stack {
        position: sticky;
        top: clamp(1.5rem, 4vw, 2rem);
      }
    }

    .biz-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.35rem 1.35rem 1.25rem;
      text-align: start;
    }

    .biz-card__head {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .biz-card__title {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.65rem, 4vw, 2rem);
      font-weight: 600;
      line-height: 1.2;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      line-height: 1;
    }

    .badge--ok {
      color: #b8f5e0;
      background: rgba(46, 196, 139, 0.18);
      border: 1px solid rgba(46, 196, 139, 0.35);
    }

    .badge--type {
      color: var(--muted);
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
    }

    .biz-card__desc {
      font-size: 0.9375rem;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 1.25rem;
    }

    .biz-dl {
      margin: 0;
      display: grid;
      gap: 1rem 1.25rem;
    }

    @media (min-width: 340px) {
      .biz-dl {
        grid-template-columns: 1fr 1fr;
      }

      .biz-dl .biz-row--wide {
        grid-column: 1 / -1;
      }
    }

    .biz-row {
      margin: 0;
    }

    .biz-row dt {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.35rem;
    }

    .biz-row dd {
      margin: 0;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }

    .biz-row a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s, color 0.15s;
    }

    .biz-row a:hover {
      border-bottom-color: rgba(61, 156, 240, 0.5);
    }

    .biz-row a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .biz-card__foot {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .card-embed {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: min(720px, 82vh);
    }

    .card-embed[hidden] {
      display: none !important;
    }

    .embed-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.85rem 1rem 0.85rem 1.15rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }

    .embed-head span {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
    }

    .btn-ghost {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(61, 156, 240, 0.1);
      border-color: var(--accent);
    }

    .embed-body {
      position: relative;
      flex: 1;
      min-height: min(640px, 78vh);
      background: var(--bg);
    }

    .embed-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      z-index: 2;
    }

    .embed-loader[hidden] {
      display: none !important;
    }

    .embed-loader p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .booking-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .booking-iframe.is-ready {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main class="wrap embed-open" id="main-wrap">
    <div class="left-stack">
      <article class="biz-card" aria-labelledby="biz-name">
        <header class="biz-card__head">
          <h1 id="biz-name" class="biz-card__title">Medgel Georgia</h1>
        </header>
        <p class="biz-card__desc">Laser hair removal service</p>
        <dl class="biz-dl">
          <div class="biz-row">
            <dt>City</dt>
            <dd>Tbilisi</dd>
          </div>
          <div class="biz-row">
            <dt>Email</dt>
            <dd><a href="mailto:info@medgel.ge">info@medgel.ge</a></dd>
          </div>
          <div class="biz-row">
            <dt>Phone</dt>
            <dd><a href="tel:+995596575757">+995 596 57 57 57</a></dd>
          </div>
          <div class="biz-row">
            <dt>Website</dt>
            <dd><a href="https://medgel.ge" rel="noopener noreferrer" target="_blank">medgel.ge</a></dd>
          </div>
          <div class="biz-row biz-row--wide">
            <dt>Address</dt>
            <dd>27 Akaki Tsereteli Ave, Tbilisi 0119, Georgia</dd>
          </div>
        </dl>
        <div class="biz-card__foot" aria-label="Business verification">
          <span class="badge badge--ok">Verified</span>
          <span class="badge badge--type">Clinic</span>
        </div>
      </article>
    </div>

    <section class="card-embed" id="panel-embed" aria-label="Medni online booking">
      <div class="embed-head">
        <span>Medni · Book an appointment</span>
        <button type="button" class="btn-ghost" id="btn-close-embed">Close</button>
      </div>
      <div class="embed-body">
        <div class="embed-loader" id="embed-loader">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading booking…</p>
        </div>
        <iframe
          id="booking-frame"
          class="booking-iframe"
          title="Medni booking — Medgel Georgia"
          allow="clipboard-read; clipboard-write; fullscreen"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var MEDNI_BOOKING_URL = "https://www.medni.ge/en/booking/medgel";
      var btnClose = document.getElementById("btn-close-embed");
      var mainWrap = document.getElementById("main-wrap");
      var panelEmbed = document.getElementById("panel-embed");
      var loader = document.getElementById("embed-loader");
      var frame = document.getElementById("booking-frame");
      var loadTimeoutId;

      function clearLoadTimeout() {
        if (loadTimeoutId) {
          clearTimeout(loadTimeoutId);
          loadTimeoutId = null;
        }
      }

      function onFrameLoad() {
        if (panelEmbed.hidden) return;
        var src = frame.getAttribute("src") || "";
        if (!src || src.indexOf("medni.ge") === -1) return;
        clearLoadTimeout();
        loader.hidden = true;
        frame.classList.add("is-ready");
      }

      function beginIframeLoad() {
        clearLoadTimeout();
        loader.hidden = false;
        frame.classList.remove("is-ready");
        frame.src = MEDNI_BOOKING_URL;
        loadTimeoutId = setTimeout(function () {
          loader.hidden = true;
          frame.classList.add("is-ready");
          loadTimeoutId = null;
        }, 20000);
      }

      function hideEmbed() {
        panelEmbed.hidden = true;
        mainWrap.classList.remove("embed-open");
        clearLoadTimeout();
      }

      frame.addEventListener("load", onFrameLoad);

      beginIframeLoad();

      btnClose.addEventListener("click", hideEmbed);
    })();
  </script>
</body>
</html>
