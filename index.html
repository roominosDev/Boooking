<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medgel Georgia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
      --accent-dim: #2b7fc9;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(61, 156, 240, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 90% 60%, rgba(100, 180, 255, 0.08), transparent);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: min(1280px, calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.25rem, 4vw, 2rem) clamp(1.75rem, 4vw, 2.75rem);
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1.75rem, 4vw, 2.5rem);
      align-items: start;
    }

    @media (min-width: 900px) {
      .wrap.embed-open {
        grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
        column-gap: clamp(2rem, 4.5vw, 3rem);
        align-items: stretch;
      }
    }

    .left-stack {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 28rem;
      justify-self: center;
    }

    @media (min-width: 900px) {
      .wrap.embed-open .left-stack {
        position: sticky;
        top: clamp(1.5rem, 4vw, 2rem);
      }
    }

    .biz-card {
      width: 100%;
      background: linear-gradient(165deg, rgba(26, 34, 45, 0.98) 0%, rgba(18, 24, 32, 0.99) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      padding: 0;
      text-align: start;
      overflow: hidden;
    }

    .biz-card__ribbon {
      height: 4px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent), #5eb8ff);
      opacity: 0.95;
    }

    .biz-card__inner {
      padding: 1.35rem 1.4rem 0;
    }

    .biz-card__head {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .biz-card__mark {
      flex-shrink: 0;
      width: 3rem;
      height: 3rem;
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(61, 156, 240, 0.25), rgba(61, 156, 240, 0.08));
      border: 1px solid rgba(61, 156, 240, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }

    .biz-card__head-text {
      min-width: 0;
      padding-top: 0.15rem;
    }

    .biz-card__title {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.5rem, 3.8vw, 1.85rem);
      font-weight: 600;
      line-height: 1.2;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      line-height: 1;
    }

    .badge--ok {
      color: #b8f5e0;
      background: rgba(46, 196, 139, 0.18);
      border: 1px solid rgba(46, 196, 139, 0.35);
    }

    .badge--type {
      color: var(--muted);
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
    }

    .biz-card__desc {
      font-size: 0.9375rem;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 1.35rem;
    }

    .biz-contact {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .biz-contact li {
      margin: 0;
      padding: 0;
    }

    .biz-contact__item--static {
      cursor: default;
    }

    .biz-contact__item--static:hover {
      background: rgba(0, 0, 0, 0.22);
      border-color: rgba(45, 58, 74, 0.85);
    }

    .biz-contact__item {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.75rem 0.85rem;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(45, 58, 74, 0.85);
      text-decoration: none;
      color: inherit;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
    }

    a.biz-contact__item:hover {
      background: rgba(61, 156, 240, 0.08);
      border-color: rgba(61, 156, 240, 0.35);
    }

    a.biz-contact__item:active {
      transform: scale(0.99);
    }

    a.biz-contact__item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .biz-contact__icon {
      flex-shrink: 0;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 10px;
      background: rgba(61, 156, 240, 0.12);
      border: 1px solid rgba(61, 156, 240, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .biz-contact__icon svg {
      width: 1.1rem;
      height: 1.1rem;
      display: block;
    }

    .biz-contact__text {
      flex: 1;
      min-width: 0;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      padding-top: 0.2rem;
      word-break: break-word;
    }

    a.biz-contact__item .biz-contact__text {
      color: #cfe4f7;
    }

    a.biz-contact__item:hover .biz-contact__text {
      color: var(--text);
    }

    .biz-card__foot {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin: 1.2rem -1.4rem 0;
      padding: 1rem 1.4rem 1.25rem;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.18);
    }

    .card-embed {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: min(720px, 82vh);
    }

    .card-embed[hidden] {
      display: none !important;
    }

    .embed-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.85rem 1rem 0.85rem 1.15rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }

    .embed-head span {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
    }

    .btn-ghost {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(61, 156, 240, 0.1);
      border-color: var(--accent);
    }

    .embed-body {
      position: relative;
      flex: 1;
      min-height: min(640px, 78vh);
      background: var(--bg);
    }

    .embed-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      z-index: 2;
    }

    .embed-loader[hidden] {
      display: none !important;
    }

    .embed-loader p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .booking-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .booking-iframe.is-ready {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main class="wrap embed-open" id="main-wrap">
    <div class="left-stack">
      <article class="biz-card" aria-labelledby="biz-name">
        <div class="biz-card__ribbon" aria-hidden="true"></div>
        <div class="biz-card__inner">
          <header class="biz-card__head">
            <div class="biz-card__mark" aria-hidden="true">M</div>
            <div class="biz-card__head-text">
              <h1 id="biz-name" class="biz-card__title">Medgel Georgia</h1>
            </div>
          </header>
          <p class="biz-card__desc">Laser hair removal service</p>
          <nav class="biz-contact-wrap" aria-label="Contact">
            <ul class="biz-contact">
              <li>
                <a class="biz-contact__item" href="mailto:info@medgel.ge" aria-label="Email info@medgel.ge">
                  <span class="biz-contact__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                      <polyline points="22,6 12,13 2,6" />
                    </svg>
                  </span>
                  <span class="biz-contact__text">info@medgel.ge</span>
                </a>
              </li>
              <li>
                <a
                  class="biz-contact__item"
                  href="https://medgel.ge"
                  rel="noopener noreferrer"
                  target="_blank"
                  aria-label="Website medgel.ge"
                >
                  <span class="biz-contact__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <circle cx="12" cy="12" r="10" />
                      <line x1="2" y1="12" x2="22" y2="12" />
                      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                    </svg>
                  </span>
                  <span class="biz-contact__text">medgel.ge</span>
                </a>
              </li>
              <li>
                <div class="biz-contact__item biz-contact__item--static">
                  <span class="biz-contact__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                      <circle cx="12" cy="10" r="3" />
                    </svg>
                  </span>
                  <span class="biz-contact__text">27 Akaki Tsereteli Ave, Tbilisi 0119, Georgia</span>
                </div>
              </li>
            </ul>
          </nav>
          <div class="biz-card__foot" aria-label="Business verification">
            <span class="badge badge--ok">Verified</span>
            <span class="badge badge--type">Clinic</span>
          </div>
        </div>
      </article>
    </div>

    <section class="card-embed" id="panel-embed" aria-label="Medni online booking">
      <div class="embed-head">
        <span>Medni · Book an appointment</span>
        <button type="button" class="btn-ghost" id="btn-close-embed">Close</button>
      </div>
      <div class="embed-body">
        <div class="embed-loader" id="embed-loader">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading booking…</p>
        </div>
        <iframe
          id="booking-frame"
          class="booking-iframe"
          title="Medni booking — Medgel Georgia"
          allow="clipboard-read; clipboard-write; fullscreen"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var MEDNI_BOOKING_URL = "https://www.medni.ge/en/booking/medgel";
      var btnClose = document.getElementById("btn-close-embed");
      var mainWrap = document.getElementById("main-wrap");
      var panelEmbed = document.getElementById("panel-embed");
      var loader = document.getElementById("embed-loader");
      var frame = document.getElementById("booking-frame");
      var loadTimeoutId;

      function clearLoadTimeout() {
        if (loadTimeoutId) {
          clearTimeout(loadTimeoutId);
          loadTimeoutId = null;
        }
      }

      function onFrameLoad() {
        if (panelEmbed.hidden) return;
        var src = frame.getAttribute("src") || "";
        if (!src || src.indexOf("medni.ge") === -1) return;
        clearLoadTimeout();
        loader.hidden = true;
        frame.classList.add("is-ready");
      }

      function beginIframeLoad() {
        clearLoadTimeout();
        loader.hidden = false;
        frame.classList.remove("is-ready");
        frame.src = MEDNI_BOOKING_URL;
        loadTimeoutId = setTimeout(function () {
          loader.hidden = true;
          frame.classList.add("is-ready");
          loadTimeoutId = null;
        }, 20000);
      }

      function hideEmbed() {
        panelEmbed.hidden = true;
        mainWrap.classList.remove("embed-open");
        clearLoadTimeout();
      }

      frame.addEventListener("load", onFrameLoad);

      beginIframeLoad();

      btnClose.addEventListener("click", hideEmbed);
    })();
  </script>
</body>
</html>
