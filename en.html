<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
      --accent-dim: #2b7fc9;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.25rem, 4vw, 1.75rem);
      box-shadow: var(--shadow);
      max-width: 480px;
      margin: 0 auto;
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
    }

    .card .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin: 0 0 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.85rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 156, 240, 0.2);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 0.85rem;
    }

    @media (min-width: 420px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 0.15rem;
      padding: 0.8rem 1.2rem;
      font: inherit;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
    }

    button[type="submit"]:hover {
      filter: brightness(1.05);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>
  <section class="card" aria-labelledby="form-title">
    <h2 id="form-title">Request a booking</h2>
    <p class="sub">Demo — fields marked * are required.</p>

    <form action="#" method="post">
      <div class="row two">
        <div>
          <label for="name">Full name *</label>
          <input id="name" name="name" type="text" autocomplete="name" required placeholder="Jane Doe" />
        </div>
        <div>
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
      </div>

      <div class="row two">
        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+1 555 000 0000" />
        </div>
        <div>
          <label for="service">Service *</label>
          <select id="service" name="service" required>
            <option value="" disabled selected>Select one</option>
            <option value="consult">Consultation</option>
            <option value="standard">Standard session</option>
            <option value="extended">Extended session</option>
          </select>
        </div>
      </div>

      <div class="row two">
        <div>
          <label for="date">Preferred date *</label>
          <input id="date" name="date" type="date" required />
        </div>
        <div>
          <label for="time">Preferred time *</label>
          <input id="time" name="time" type="time" required />
        </div>
      </div>

      <label for="notes">Notes (optional)</label>
      <textarea id="notes" name="notes" placeholder="Anything we should know?"></textarea>

      <button type="submit">Submit request</button>
    </form>
  </section>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book · Medgel Georgia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);

      /*
        Cross-origin crop tuning (used only when Strategy B applies).
        Approximate chrome heights on the embedded site; adjust if the partner layout changes.
      */
      --embed-chrome-header: clamp(52px, 10dvh, 88px);
      --embed-chrome-footer: clamp(80px, 14dvh, 160px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(61, 156, 240, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 90% 60%, rgba(100, 180, 255, 0.08), transparent);
      z-index: 0;
    }

    /* Main content: centered, responsive (unchanged intent). */
    main {
      position: relative;
      z-index: 1;
      width: 100%;
      margin: 0;
      padding: clamp(1rem, 3vw, 2rem);
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    .card-embed {
      display: flex;
      flex-direction: column;
      flex: 0 0 auto;
      width: min(1040px, calc(100% - 2rem));
      min-width: 0;
      height: min(88dvh, 860px);
      min-height: min(560px, 80dvh);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-embed[hidden] {
      display: none !important;
    }

    .embed-body {
      position: relative;
      flex: 1;
      min-height: 0;
      background: var(--bg);
    }

    /*
      Clip container for the iframe.
      Strategy A (same-origin): overflow hidden still OK; iframe fills the box and inner header/footer are hidden via JS.
      Strategy B (cross-origin): overflow hidden crops a taller, upward-shifted iframe to hide top/bottom chrome visually.
    */
    .embed-crop {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .embed-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      z-index: 2;
    }

    .embed-loader[hidden] {
      display: none !important;
    }

    .embed-loader p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Default / Strategy A: iframe fills the crop box. */
    .booking-iframe {
      position: absolute;
      left: 0;
      width: 100%;
      top: 0;
      height: 100%;
      border: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .booking-iframe.is-ready {
      opacity: 1;
      pointer-events: auto;
    }

    /*
      Strategy B (cross-origin): cannot access iframe document, so we simulate hiding header/footer
      by making the iframe taller than the viewport and shifting it up; overflow:hidden on .embed-crop
      clips the top (header) and bottom (footer). Tweak --embed-chrome-header / --embed-chrome-footer if needed.
    */
    .embed-crop--strategy-crop .booking-iframe {
      top: calc(-1 * var(--embed-chrome-header));
      height: calc(100% + var(--embed-chrome-header) + var(--embed-chrome-footer));
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main>
    <section class="card-embed" id="panel-embed" aria-label="Online booking">
      <div class="embed-body">
        <div class="embed-loader" id="embed-loader">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading …</p>
        </div>
        <!-- Wrapper required for Strategy B clipping; Strategy A uses it as a simple full-bleed box. -->
        <div class="embed-crop" id="embed-crop">
          <iframe
            id="booking-frame"
            class="booking-iframe"
            title="Medni booking — Medgel Georgia"
            allow="clipboard-read; clipboard-write; fullscreen"
          ></iframe>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var MEDNI_BOOKING_URL = "https://www.medni.ge/en/booking/medgel";
      var panelEmbed = document.getElementById("panel-embed");
      var loader = document.getElementById("embed-loader");
      var frame = document.getElementById("booking-frame");
      var crop = document.getElementById("embed-crop");
      var loadTimeoutId;

      function clearLoadTimeout() {
        if (loadTimeoutId) {
          clearTimeout(loadTimeoutId);
          loadTimeoutId = null;
        }
      }

      /**
       * After load, either:
       * Strategy A — Same-origin: read the iframe document and set header/footer to display:none (clean, exact).
       * Strategy B — Cross-origin: parent cannot read child DOM (browser security). Use CSS crop on .embed-crop.
       */
      function applyIframeChromeStrategy() {
        crop.classList.remove("embed-crop--strategy-crop");

        var sameOrigin = false;
        try {
          var win = frame.contentWindow;
          var doc = frame.contentDocument;
          if (!doc || !win) {
            throw new Error("no document");
          }
          /* Reading location.origin on a cross-origin frame throws SecurityError. */
          if (win.location.origin !== window.location.origin) {
            throw new Error("cross-origin");
          }
          sameOrigin = true;
        } catch (err) {
          sameOrigin = false;
        }

        if (sameOrigin) {
          /* Strategy A: same-origin — hide semantic <header> / <footer> inside the iframe. */
          try {
            var idoc = frame.contentDocument || frame.contentWindow.document;
            if (!idoc) {
              throw new Error("missing doc");
            }
            idoc.querySelectorAll("header").forEach(function (el) {
              el.style.display = "none";
            });
            idoc.querySelectorAll("footer").forEach(function (el) {
              el.style.display = "none";
            });
          } catch (ignore) {
            /* If DOM access fails after load, fall back to Strategy B. */
            crop.classList.add("embed-crop--strategy-crop");
          }
        } else {
          /* Strategy B: cross-origin (typical for medni.ge on another host) — visual crop only. */
          crop.classList.add("embed-crop--strategy-crop");
        }
      }

      function onFrameLoad() {
        if (panelEmbed.hidden) return;
        var src = frame.getAttribute("src") || "";
        if (!src || src.indexOf("medni.ge") === -1) return;
        clearLoadTimeout();
        applyIframeChromeStrategy();
        loader.hidden = true;
        frame.classList.add("is-ready");
      }

      function beginIframeLoad() {
        clearLoadTimeout();
        crop.classList.remove("embed-crop--strategy-crop");
        loader.hidden = false;
        frame.classList.remove("is-ready");
        frame.src = MEDNI_BOOKING_URL;
        loadTimeoutId = setTimeout(function () {
          loader.hidden = true;
          frame.classList.add("is-ready");
          loadTimeoutId = null;
        }, 20000);
      }

      frame.addEventListener("load", onFrameLoad);

      beginIframeLoad();
    })();
  </script>
</body>
</html>
