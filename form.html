<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
      --accent-dim: #2b7fc9;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.25rem, 4vw, 1.75rem);
      box-shadow: var(--shadow);
      max-width: 480px;
      margin: 0 auto;
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
    }

    .card .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin: 0 0 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.85rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 156, 240, 0.2);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 0.85rem;
    }

    @media (min-width: 420px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 0.15rem;
      padding: 0.8rem 1.2rem;
      font: inherit;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
    }

    button[type="submit"]:hover {
      filter: brightness(1.05);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>
  <section class="card" aria-labelledby="form-title">
    <h2 id="form-title">Request a booking</h2>
    <p class="sub">Demo — fields marked * are required.</p>

    <form action="#" method="post">
      <div class="row two">
        <div>
          <label for="name">Full name *</label>
          <input id="name" name="name" type="text" autocomplete="name" required placeholder="Jane Doe" />
        </div>
        <div>
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
      </div>

      <div class="row two">
        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+1 555 000 0000" />
        </div>
        <div>
          <label for="service">Service *</label>
          <select id="service" name="service" required>
            <option value="" disabled selected>Select one</option>
            <option value="consult">Consultation</option>
            <option value="standard">Standard session</option>
            <option value="extended">Extended session</option>
          </select>
        </div>
      </div>

      <div class="row two">
        <div>
          <label for="date">Preferred date *</label>
          <input id="date" name="date" type="date" required />
        </div>
        <div>
          <label for="time">Preferred time *</label>
          <input id="time" name="time" type="time" required />
        </div>
      </div>

      <label for="notes">Notes (optional)</label>
      <textarea id="notes" name="notes" placeholder="Anything we should know?"></textarea>

      <button type="submit">Submit request</button>
    </form>
  </section>
</body>
</html>
